	function GetQueryString(name)

	var u = navigator.userAgent;
	function isAndroid(){
		return u.indexOf('Android') > -1 || u.indexOf('Adr') > -1;
	}
	
	function isIOS(){
		return !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/);
	}
	
	function isPC() {
	    var userAgentInfo = navigator.userAgent;
	    var Agents = ["Android", "iPhone",
	        "SymbianOS", "Windows Phone",
	        "iPad", "iPod"];
	    var flag = true;
	    for (var v = 0; v < Agents.length; v++) {
	        if (userAgentInfo.indexOf(Agents[v]) > 0) {
	            flag = false;
	            break;
	        }
	    }
	    return flag;
	}

	var orient = 'vertical';
	var supportOrientation = (typeof window.orientation === 'number' && typeof window.onorientationchange === 'object');

	var updateOrientation = function() {
		if (supportOrientation) {
			switch(window.orientation) {
			case 90:
			case -90:
				orient = 'horizontal';
				break;
			default:
				orient = 'vertical';
				break;
			}
		} else {
			orient = (window.innerWidth > window.innerHeight) ? 'horizontal' : 'vertical';
		}

		if (window.sceneChangeRemind) {
			window.sceneChangeRemind(orient);
		}
	};

	window.onresize = function()
	{
		if (!supportOrientation) {
			updateOrientation();
		}
		layout();
	}

	function sendLog(type, strParam, intParam)
	{
		console.log(strParam);
		return;
		if (false == getLogEnabled()) {
			return;
		}

		var xmlHttp = new XMLHttpRequest(); 

		var logUrl = getLogUrl();
		logUrl += "?uid=" + getDeviceId();
		logUrl += "&type=" + type;
		if (intParam) {
			logUrl += "&intParam3=" + intParam;
		}

		logUrl += "&strParam1=" + getPF();
		if (strParam) {
			logUrl += "&strParam2=" + strParam;
		}

		xmlHttp.open("GET", logUrl, true);
		xmlHttp.send(null);
	}

	function layout()
	{
		var divLoadW = 750;
		var divLoadH = 1334;
		var w, h;
     	if (!!(window.attachEvent && !window.opera))
     	{
     		h = document.documentElement.clientHeight;
     		w = document.documentElement.clientWidth;
     	}
     	else
     	{
     		h = window.innerHeight;
     		w = window.innerWidth;
     	}

     	var bgImg = document.getElementById('img_bg');
     	bgImg.width = divLoadW;
     	bgImg.height = divLoadH;
		
		var rotate = w / h >= 1;
		if (isPC())
		{
			rotate = false;
		}
		
		var scale;
		var centerX = (w - divLoadW) / 2;
		var centerY = (h - divLoadH) / 2;
		if(rotate)
		{
			var swap = h;
			h = w;
			w = swap;
		}
		
		layoutTopDown(w, h, divLoadW, divLoadH);
		
		var divTopDown = document.getElementById('div_topdown');
		if(divTopDown)
		{
			if(rotate)
			{
				setTransform(divTopDown, "matrix("+0+",-"+1+","+1+","+0+","+((h - w) / 2)+","+((w - h) / 2)+")");
			}
			else
			{
				setTransform(divTopDown, "matrix("+1+",0,0,"+1+","+0+","+0+")");
			}
		}
		
		if(h / w >= divLoadH / divLoadW)
		{
			scale = w / divLoadW;
		}
		else
		{
			scale = h / divLoadH;
		}
		
		var divLoad = document.getElementById('div_load');
		if(divLoad)
		{
			if(rotate)
			{
				setTransform(divLoad, "matrix("+0+",-"+scale+","+scale+","+0+","+centerX+","+centerY+")");
			}
			else
			{
				setTransform(divLoad, "matrix("+scale+",0,0,"+scale+","+((w - divLoadW) / 2)+","+((h - divLoadH) / 2)+")");
			}
		}
		
		var divCS = document.getElementById('div_cs');
		if(divCS)
		{
			if(rotate)
			{
				setTransform(divCS, "matrix("+0+",-"+scale+","+scale+","+0+","+centerX+","+centerY+")");
			}
			else
			{
				setTransform(divCS, "matrix("+scale+",0,0,"+scale+","+((w - divLoadW) / 2)+","+((h - divLoadH) / 2)+")");
			}
		}
		
		if(rotate)
		{
			setTransform(bgImg, "matrix("+0+",-"+scale+","+scale+","+0+","+centerX+","+centerY+")");
		}
		else
		{
			setTransform(bgImg, "matrix("+scale+",0,0,"+scale+","+((w - divLoadW) / 2)+","+((h - divLoadH) / 2)+")");
		}

		var qrcodeDiv = document.getElementById("qrcode_panel");
    	if(qrcodeDiv){
            if(rotate)
            {
                setTransform(qrcodeDiv, "matrix("+0+",-"+scale+","+scale+","+0+","+centerX+","+centerY+")");
            }
            else
            {
                setTransform(qrcodeDiv, "matrix("+scale+",0,0,"+scale+","+((w - divLoadW) / 2)+","+((h - divLoadH) / 2)+")");
            }
        }
	}
	
	function layoutTopDown(divTopDownW, divTopDownH, gameW, gameH)
	{	
		var divTopDown = document.getElementById('div_topdown');
		if(!divTopDown)
		{
			return;
		}
		divTopDown.style.cssText='width: ' + divTopDownW + 'px;height: ' + divTopDownH + 'px;z-index: -3;position: absolute;top: 0;pointer-events: none;background: url(comp/common/main_bg_3.png?v=20190514.01);background-size:cover;';
		
		var top = document.getElementById('topEdge');
		top.style.cssText='width: ' + divTopDownW + 'px;height: 200px;position: absolute;top: 0px;background: url(comp/loading/topdown.png?v=20181228.01) no-repeat;';
		var down = document.getElementById('downEdge');
		down.style.cssText='width: ' + divTopDownW + 'px;height: 200px;position: absolute;bottom: 0px;background: url(comp/loading/topdown.png?v=20181228.01) no-repeat;';
		
		if(divTopDownW / divTopDownH > gameW / gameH)
		{
			top.style.display = "none";
			down.style.display = "none";
		}
		else
		{
			top.style.display = "block";
			down.style.display = "block";
		}
	}
	
	function setTransform(target, code)
	{
		target.style.transform=
		target.style["-ms-transform"]=/* IE 9 */
		target.style["-moz-transform"]=/* Firefox */
		target.style["-webkit-transform"]=/* Safari 和 Chrome */
		target.style["-o-transform"]=code;/* Opera */
	}

	function onError(msg,url,line,column,detail){
		return;
		if (detail) {
			alert("出错啦，请把此信息截图给研发商\n"+msg+"\n"+detail.stack);
			
			var logUrl = getLogUrl();
			
			var logStr = msg + ",stack--" + detail.stack;
			logUrl += "?uid=" + getDeviceId() + "&type=error_log&strParam1=" + getPF() + "&strParam2=" + logStr;
			console.log(logStr);
			if (false == getLogEnabled()) {
				return;
			}
			var xmlHttp = new XMLHttpRequest();
			xmlHttp.open("GET", logUrl, true);
			xmlHttp.send(null);
		}
	}
